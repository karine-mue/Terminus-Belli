<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminus-Belli: Convergence</title>
    <style>
        :root { --bg: #050505; --panel: rgba(15, 15, 15, 0.9); --accent: #900; --text: #eee; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow: hidden; height: 100dvh; position: fixed; width: 100%; }
        
        #stage { display: grid; width: 100vw; height: 100dvh; z-index: 1; position: absolute; top: 0; left: 0; }
        .cell { outline: 0.1px solid #1a1a1a; transition: background-color 0.1s; position: relative; }

        #hud-toggle {
            position: absolute; bottom: 30px; right: 20px; z-index: 110;
            background: var(--panel); border-radius: 50%; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; border: 1px solid #444; backdrop-filter: blur(5px);
        }

        #hud-panel {
            position: absolute; bottom: 90px; right: 20px;
            width: 90%; max-width: 320px; background: var(--panel);
            backdrop-filter: blur(10px); border: 1px solid #444; border-radius: 12px;
            padding: 15px; z-index: 100; box-sizing: border-box; display: none;
        }
        #hud-panel.open { display: block; }

        #legend {
            position: absolute; top: 10px; left: 10px; z-index: 100;
            background: rgba(0,0,0,0.5); padding: 8px; border-radius: 6px; font-size: 9px;
            border: 1px solid #333; pointer-events: none; backdrop-filter: blur(2px);
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 3px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; outline: 1px solid #fff; }

        #cards-panel {
            position: absolute; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px; pointer-events: none;
        }
        .card {
            background: rgba(20, 0, 0, 0.8); border: 1px solid var(--accent); color: #fff;
            padding: 8px; border-radius: 4px; font-size: 10px; cursor: pointer;
            text-align: center; box-shadow: 0 0 5px var(--accent); user-select: none;
            pointer-events: auto; font-weight: bold; transition: all 0.2s; display: none;
        }
        .card:active { transform: scale(0.95); }
        .card.used { opacity: 0.3; pointer-events: none; border-color: #333; box-shadow: none; filter: grayscale(1); }

        #announcement {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            font-size: 22px; font-weight: 900; pointer-events: none; opacity: 0; z-index: 1000;
            text-align: center; white-space: nowrap; letter-spacing: 1px;
        }
        .announce-show { animation: scaleFade 3.5s forwards; }
        @keyframes scaleFade {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            10% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; }
        }

        .control-group { margin-bottom: 8px; }
        label { font-size: 10px; color: #aaa; display: flex; justify-content: space-between; }
        input[type="range"] { width: 100%; margin: 3px 0; accent-color: var(--accent); cursor: crosshair; }
        .conflict-btn { width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .conflict-btn:disabled { background: #333; color: #666; }

        .spark { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 50; filter: blur(1px); box-shadow: 0 0 4px #fff, 0 0 8px #f90; animation: spark-anim 0.3s ease-out forwards; }
        @keyframes spark-anim { 0% { transform: scale(1) translate(0, 0); opacity: 1; } 100% { transform: scale(0.5) translate(var(--tx), var(--ty)); opacity: 0; } }
        .effect-icon { position: absolute; pointer-events: none; font-size: 20px; animation: fadeUp 1s forwards; z-index: 200; text-shadow: 0 0 5px #000; }
        @keyframes fadeUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-60px); opacity: 0; } }
        #log-area { font-size: 9px; color: #0f0; height: 40px; overflow: hidden; margin-top: 5px; border-top: 1px solid #333; padding-top: 3px; }

        #territory-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; display: flex; z-index: 102; pointer-events: none; }
        .t-seg { height: 100%; transition: width 0.4s ease; }

        #announcement { white-space: pre-wrap; }

        .reset-btn { width: 100%; padding: 8px; background: #222; color: #888; border: 1px solid #444; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 6px; font-size: 12px; }
        .reset-btn:hover { background: #333; color: #ccc; }

        #zoom-hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #444; pointer-events: none; z-index: 50; animation: hintFade 4s 3s forwards; opacity: 1; }
        @keyframes hintFade { to { opacity: 0; } }
    </style>
</head>
<body>

    <div id="legend"></div>
    <div id="cards-panel">
        <div class="card" id="card-meteor" onclick="activateMeteor()">☄️ メテオフォール</div>
        <div class="card" id="card-singularity" onclick="useCard('singularity')">💡 特異点到達</div>
        <div class="card" id="card-ipo" onclick="useCard('ipo')">💰 強制IPO</div>
    </div>
    
    <div id="announcement"></div>

    <div id="hud-toggle">⚙️</div>
    <div id="hud-panel" class="open">
        <div class="control-group"><button class="conflict-btn" id="startBtn">紛争を開始</button></div>
        <div class="control-group"><label><span>秩序 (Order)</span><span>混沌 (Chaos)</span></label><input type="range" id="chaosSlider" min="1" max="30" value="2"></div>
        <div class="control-group"><label><span>時空律 (Time): <span id="speedVal">x1</span></span><span style="color:#600; font-weight:bold;">※不可逆</span></label><input type="range" id="speedSlider" min="1" max="50" value="1"></div>
        <div id="status" style="font-size:10px; color:#888; text-align:center;">Terminal Standing by...</div>
        <button class="reset-btn" id="resetBtn" onclick="resetGame()">↺ もう一回</button>
        <div id="log-area"></div>
    </div>

    <div id="stage"></div>
    <div id="territory-bar"></div>
    <div id="zoom-hint">👆 2本指でズーム・スクロール</div>

    <script>
        const GRID_SIZE = 40; 
        let isConflict = false;
        let gameInterval;
        let currentSpeed = 1;
        let maxSpeedReached = 1;
        let doomCounter = 0.00001;
        let tickCount = 0;
        let exhaustionPhase = false;
        let meteorPending = false;
        let singularityFactionId = null;
        let singularityEndTick = 0;

        // ズーム・パン状態
        let mapScale = 1, mapPanX = 0, mapPanY = 0;
        let lastPinchDist = 0, lastPanTouchX = 0, lastPanTouchY = 0;

        // 派閥の初期ステートを記憶（リセット用）
        const INITIAL_STATES = {};
        const FACTIONS = [
            { id: 1, name: "Goo〇le",    color: "#EA4335", state: "RD"  },
            { id: 2, name: "Micr〇soft", color: "#00A4EF", state: "B2G" },
            { id: 3, name: "Ope〇AI",   color: "#10a37f", state: "B2C" },
            { id: 4, name: "Met〇",      color: "#1877F2", state: "B2C" },
            { id: 7, name: "Alibab〇",  color: "#8E44AD", state: "RD"  },
            { id: 8, name: "Anthr〇pic", color: "#D48359", state: "RD"  }
        ];

        // FACTIONS は上で定義済み
        FACTIONS.forEach(f => INITIAL_STATES[f.id] = f.state);

        const stage = document.getElementById('stage');
        const startBtn = document.getElementById('startBtn');
        const hudToggle = document.getElementById('hud-toggle');
        const hudPanel = document.getElementById('hud-panel');
        const legend = document.getElementById('legend');
        const logArea = document.getElementById('log-area');
        const announcement = document.getElementById('announcement');
        
        let cells = [];
        let gridState = Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(0));

        function init() {
            stage.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                stage.appendChild(cell);
                cells.push(cell);
            }
            updateLegend({});
        }

        hudToggle.addEventListener('click', () => hudPanel.classList.toggle('open'));

        function applyMapTransform() {
            const maxPX = Math.max(0, (mapScale - 1) * window.innerWidth  / 2);
            const maxPY = Math.max(0, (mapScale - 1) * window.innerHeight / 2);
            mapPanX = Math.max(-maxPX, Math.min(maxPX, mapPanX));
            mapPanY = Math.max(-maxPY, Math.min(maxPY, mapPanY));
            stage.style.transform = `translate(${mapPanX}px,${mapPanY}px) scale(${mapScale})`;
            stage.style.transformOrigin = '50% 50%';
        }

        stage.addEventListener('touchstart', e => {
            if (meteorPending) return;
            if (e.touches.length === 2) {
                lastPinchDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY);
            } else if (e.touches.length === 1) {
                lastPanTouchX = e.touches[0].clientX;
                lastPanTouchY = e.touches[0].clientY;
            }
        }, { passive: true });

        stage.addEventListener('touchmove', e => {
            if (meteorPending) return;
            e.preventDefault();
            if (e.touches.length === 2) {
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY);
                mapScale = Math.max(1, Math.min(5, mapScale * (dist / lastPinchDist)));
                lastPinchDist = dist;
                applyMapTransform();
            } else if (e.touches.length === 1 && mapScale > 1) {
                mapPanX += e.touches[0].clientX - lastPanTouchX;
                mapPanY += e.touches[0].clientY - lastPanTouchY;
                lastPanTouchX = e.touches[0].clientX;
                lastPanTouchY = e.touches[0].clientY;
                applyMapTransform();
            }
        }, { passive: false });

        // ダブルタップでズームリセット
        let lastTap = 0;
        stage.addEventListener('touchend', e => {
            if (meteorPending) return;
            const now = Date.now();
            if (now - lastTap < 300) { mapScale = 1; mapPanX = 0; mapPanY = 0; applyMapTransform(); }
            lastTap = now;
        }, { passive: true });

        function addLog(msg) {
            const p = document.createElement('div'); p.innerText = `> ${msg}`; logArea.prepend(p);
        }

        function announce(msg, textColor = "#fff", glowColor = "#fff") {
            addLog(msg);
            announcement.innerText = msg;
            announcement.style.color = textColor;
            announcement.style.textShadow = `
                2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000,
                0 0 10px ${glowColor}, 0 0 20px ${glowColor}
            `;
            announcement.classList.remove('announce-show');
            void announcement.offsetWidth; 
            announcement.classList.add('announce-show');
        }

        function updateLegend(counts) {
            const total = GRID_SIZE * GRID_SIZE;
            const usedCells = Object.values(counts).reduce((a, b) => a + b, 0);
            const remaining = total - usedCells;
            const pct = v => (v / total * 100).toFixed(1);

            legend.innerHTML = FACTIONS.map(f => {
                const c = counts[f.id] || 0;
                return `<div class="legend-item" style="${f.active === false ? 'opacity:0.35' : ''}">
                    <div class="dot" style="background:${f.color};${f.active === false ? 'filter:grayscale(1)' : ''}"></div>
                    <span>${f.active === false ? '🤝 ' : f.id === singularityFactionId ? '🌌 ' : ''}${f.name} [${f.state}] : ${c} (${pct(c)}%)</span>
                </div>`;
            }).join('') + `<div class="legend-item" style="margin-top:3px;border-top:1px solid #333;padding-top:3px">
                <div class="dot" style="background:#111;outline:1px solid #555"></div>
                <span>未占領 : ${remaining} (${pct(remaining)}%)</span>
            </div>`;

            // 領土バー更新
            const bar = document.getElementById('territory-bar');
            bar.innerHTML = FACTIONS.filter(f => f.active !== false && (counts[f.id] || 0) > 0).map(f =>
                `<div class="t-seg" style="width:${pct(counts[f.id] || 0)}%;background:${f.color}"></div>`
            ).join('') + `<div class="t-seg" style="width:${pct(remaining)}%;background:#111"></div>`;

            return counts;
        }

        function checkMergers(counts) {
            const MA_THRESHOLD = 60;
            // 序盤猶予: マップが30%埋まるまでM&Aなし（開始直後の連鎖買収を防ぐ）
            const occupied = Object.values(counts).reduce((a, b) => a + b, 0);
            if (occupied < GRID_SIZE * GRID_SIZE * 0.3) return;

            FACTIONS.forEach(target => {
                if (!target.active) return;
                // セルがゼロになった派閥は自然消滅
                if ((counts[target.id] || 0) === 0) { target.active = false; return; }
                if ((counts[target.id] || 0) < MA_THRESHOLD) {
                    // 最大シェアのアクティブ派閥が買収 (買収側が3倍以上でないと成立しない)
                    let acquirerId = null, maxCount = 0;
                    FACTIONS.forEach(f => {
                        if (f.active && f.id !== target.id && (counts[f.id] || 0) > maxCount) {
                            maxCount = counts[f.id]; acquirerId = f.id;
                        }
                    });
                    if (!acquirerId) return;
                    // 規模差チェック: 買収側が被買収側の3倍未満なら独禁法リスクで見送り
                    if (maxCount < (counts[target.id] || 0) * 3) return;
                    const acquirer = FACTIONS.find(f => f.id === acquirerId);
                    let transferred = 0;
                    for (let y = 0; y < GRID_SIZE; y++) {
                        for (let x = 0; x < GRID_SIZE; x++) {
                            if (gridState[y][x] === target.id) {
                                gridState[y][x] = acquirerId;
                                cells[y * GRID_SIZE + x].style.backgroundColor = acquirer.color;
                                transferred++;
                            }
                        }
                    }
                    target.active = false;
                    announce(`🤝 M&A: ${acquirer.name} が ${target.name} を買収 (+${transferred})`, acquirer.color, acquirer.color);
                }
            });
        }

        document.getElementById('speedSlider').addEventListener('input', (e) => {
            let val = parseInt(e.target.value);
            if (val < maxSpeedReached) { e.target.value = maxSpeedReached; } 
            else {
                maxSpeedReached = val; currentSpeed = val;
                document.getElementById('speedVal').innerText = `x${val}`;
                if (isConflict) restartInterval();
            }
        });

        function restartInterval() {
            clearInterval(gameInterval);
            gameInterval = setInterval(simulate, 200 / currentSpeed);
        }

        startBtn.addEventListener('click', () => {
            if (!isConflict) {
                isConflict = true; startBtn.disabled = true;
                announce("System: 紛争開始。特異点を開放。", "#fff", "#f00");
                document.querySelectorAll('.card').forEach(c => c.style.display = 'block');
                deploy(); restartInterval();
                setTimeout(() => hudPanel.classList.remove('open'), 1500);
            }
        });

        function resetGame() {
            clearInterval(gameInterval);
            isConflict = false; currentSpeed = 1; maxSpeedReached = 1;
            doomCounter = 0.00001; tickCount = 0; exhaustionPhase = false;
            meteorPending = false; singularityFactionId = null; singularityEndTick = 0;
            mapScale = 1; mapPanX = 0; mapPanY = 0;
            stage.style.transform = '';
            FACTIONS.forEach(f => { f.active = true; f.state = INITIAL_STATES[f.id]; });
            gridState = Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(0));
            cells.forEach(c => c.style.backgroundColor = '');
            startBtn.disabled = false;
            document.getElementById('speedSlider').value = 1;
            document.getElementById('speedVal').innerText = 'x1';
            document.querySelectorAll('.card').forEach(c => { c.classList.remove('used'); c.style.display = 'none'; });
            logArea.innerHTML = '';
            updateLegend({});
        }

        function deploy() {
            tickCount = 0;
            exhaustionPhase = false;
            doomCounter = 0.00001;
            meteorPending = false;
            singularityFactionId = null;
            singularityEndTick = 0;
            FACTIONS.forEach(f => {
                f.active = true;
                let x = Math.floor(Math.random()*GRID_SIZE), y = Math.floor(Math.random()*GRID_SIZE);
                gridState[y][x] = f.id; cells[y * GRID_SIZE + x].style.backgroundColor = f.color;
            });
        }

        function spawnSpark(x, y) {
            const targetCell = cells[y * GRID_SIZE + x];
            for (let i = 0; i < 2; i++) {
                const spark = document.createElement('div'); spark.className = 'spark';
                spark.style.setProperty('--tx', `${(Math.random() - 0.5) * 30}px`);
                spark.style.setProperty('--ty', `${(Math.random() - 0.5) * 30}px`);
                targetCell.appendChild(spark); setTimeout(() => spark.remove(), 300);
            }
        }

        function spawn(x, y, txt) {
            const icon = document.createElement('div'); icon.className = 'effect-icon'; icon.innerText = txt;
            const target = cells[y * GRID_SIZE + x].getBoundingClientRect();
            icon.style.left = `${target.left + window.scrollX}px`; icon.style.top = `${target.top + window.scrollY}px`;
            document.body.appendChild(icon); setTimeout(() => icon.remove(), 1000);
        }

        function useCard(type) {
            document.getElementById(`card-${type}`).classList.add('used');
            executeAnomaly(type, true);
        }

        function activateMeteor() {
            const card = document.getElementById('card-meteor');
            if (card.classList.contains('used') || meteorPending) return;
            meteorPending = true;
            announce('☄️ 着弾点をタップ — 自己責任', '#f90', '#f90');
            stage.style.cursor = 'crosshair';
            stage.addEventListener('click', onMeteorTarget, { once: true });
        }

        function onMeteorTarget(e) {
            meteorPending = false;
            stage.style.cursor = '';
            document.getElementById('card-meteor').classList.add('used');
            const rect = stage.getBoundingClientRect();
            const cx = Math.min(GRID_SIZE - 1, Math.floor((e.clientX - rect.left) / rect.width * GRID_SIZE));
            const cy = Math.min(GRID_SIZE - 1, Math.floor((e.clientY - rect.top) / rect.height * GRID_SIZE));
            const RADIUS = 8;
            let destroyed = 0;
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (Math.sqrt((x - cx) ** 2 + (y - cy) ** 2) <= RADIUS && Math.random() < 0.75) {
                        gridState[y][x] = 0;
                        cells[y * GRID_SIZE + x].style.backgroundColor = '';
                        destroyed++;
                    }
                }
            }
            announce(`☄️ メテオフォール！(${destroyed}セル消滅)`, '#f90', '#f00');
        }

        function checkStateShift(faction, count) {
            const totalCells = GRID_SIZE * GRID_SIZE;
            const share = count / totalCells;
            // 相対シェアで判定: 大半の派閥はRDのまま留まる
            if (faction.state === "RD" && share > 0.15) {      // 15%超: 240セル相当
                faction.state = "B2G";
                announce(`【転換】${faction.name} が制度向け(B2G)へ参入！`, faction.color, "#fff");
            }
            else if (faction.state === "B2G" && share > 0.35) { // 35%超: 560セル相当
                faction.state = "B2C";
                announce(`【転換】${faction.name} が大衆向け(B2C)へ開放！`, faction.color, "#fff");
            }
        }

        function executeAnomaly(type, isManual = false) {
            const counts = {}; FACTIONS.forEach(f => counts[f.id] = 0);
            for(let y=0; y<GRID_SIZE; y++) {
                for(let x=0; x<GRID_SIZE; x++) { if(gridState[y][x] !== 0) counts[gridState[y][x]]++; }
            }
            let topFactionId = null; let maxCount = 0;
            for (const id in counts) { if (counts[id] > maxCount) { maxCount = counts[id]; topFactionId = parseInt(id); } }

            if (type === 'anti') {
                const totalCells = GRID_SIZE * GRID_SIZE;
                const leaderShare = maxCount / totalCells;

                // 発動条件: 首位が真に突出していないと司法は動かない（シェア25%未満は不発）
                if (!isManual && leaderShare < 0.25) return;

                const targetF = FACTIONS.find(f => f.id === topFactionId);
                const targetName = targetF?.name || "不明";
                const tColor = targetF?.color || "#fff";

                // 削除率: シェアが大きいほど法務ノウハウで守られ傷が浅い
                // 25%シェア→28%, 50%シェア→14%, 70%シェア→5%
                const antiTrustRate = isManual ? 0.35 : Math.max(0.05, 0.35 - leaderShare * 0.6);
                announce(isManual ? `📜 介入: ${targetName}を解体！` : `⚖️ 特異事象: ${targetName}に司法のメス！(${Math.round(antiTrustRate*100)}%)`, tColor, "#fff");
                for(let y=0; y<GRID_SIZE; y++) {
                    for(let x=0; x<GRID_SIZE; x++) {
                        if(gridState[y][x] === topFactionId && Math.random() < antiTrustRate) {
                            gridState[y][x] = 0; cells[y * GRID_SIZE + x].style.backgroundColor = '';
                        }
                    }
                }
            } else if (type === 'singularity') {
                const activeFactions = FACTIONS.filter(f => f.active !== false);
                if (isManual) {
                    // 手動発動: 首位派閥が特異点モードへ、残全派閥がAI安全連合を結成
                    const leader = activeFactions.slice().sort((a, b) => (counts[b.id] || 0) - (counts[a.id] || 0))[0];
                    if (!leader) return;
                    singularityFactionId = leader.id;
                    singularityEndTick = tickCount + 1000;
                    const coalitionNames = activeFactions.filter(f => f.id !== leader.id).map(f => f.name).join('・');
                    announce(`🌌 特異点到達: ${leader.name} が超知性へ！\nAI安全連合結成: ${coalitionNames}`, leader.color, leader.color);
                } else {
                    // 自動発火: アクティブなRD派閥が十字展開ブレイクスルー
                    const candidates = activeFactions.filter(f => f.state === "RD");
                    const pool = candidates.length > 0 ? candidates : activeFactions;
                    const f = pool[Math.floor(Math.random() * pool.length)];
                    announce(`📡 特異事象: ${f.name}のブレイクスルー！`, f.color, "#fff");
                    const cx = Math.floor(Math.random() * GRID_SIZE); const cy = Math.floor(Math.random() * GRID_SIZE);
                    for(let i=-6; i<=6; i++) {
                        if(cx+i>=0 && cx+i<GRID_SIZE) { gridState[cy][cx+i] = f.id; cells[cy*GRID_SIZE + (cx+i)].style.backgroundColor = f.color; }
                        if(cy+i>=0 && cy+i<GRID_SIZE) { gridState[cy+i][cx] = f.id; cells[(cy+i)*GRID_SIZE + cx].style.backgroundColor = f.color; }
                    }
                }
            } else if (type === 'crash') {
                announce(isManual ? "⚡ 介入: 市場崩壊！" : "💥 特異事象: 局地的市場崩壊！", "#fff", "#f00");
                for(let i=0; i<GRID_SIZE*GRID_SIZE; i++) {
                    if(Math.random() < 0.10) {
                        gridState[Math.floor(i/GRID_SIZE)][i%GRID_SIZE] = 0;
                        cells[i].style.backgroundColor = '';
                    }
                }
            } else if (type === 'ipo') {
                // アクティブ派閥を降順ソートして1位・2位を特定
                const active = FACTIONS.filter(f => f.active !== false);
                const sorted = active.slice().sort((a, b) => (counts[b.id] || 0) - (counts[a.id] || 0));
                if (sorted.length < 2) return;
                const leader = sorted[0], second = sorted[1];
                const gap = (counts[leader.id] || 0) - (counts[second.id] || 0);
                const inject = Math.max(30, gap - 50); // 50セル差まで縮める

                // 空きセルをシャッフルして注入
                const empty = [];
                for (let y = 0; y < GRID_SIZE; y++)
                    for (let x = 0; x < GRID_SIZE; x++)
                        if (gridState[y][x] === 0) empty.push({x, y});
                for (let i = empty.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [empty[i], empty[j]] = [empty[j], empty[i]];
                }
                const spots = empty.slice(0, inject);
                spots.forEach(({x, y}) => {
                    gridState[y][x] = second.id;
                    cells[y * GRID_SIZE + x].style.backgroundColor = second.color;
                });
                announce(`💰 強制IPO: ${second.name} に資本注入！(+${spots.length})`, second.color, '#ff0');
            }
        }

        function checkVictory(counts) {
            const totalCells = GRID_SIZE * GRID_SIZE;
            for (const id in counts) {
                if (counts[id] > totalCells * 0.8) {
                    const winner = FACTIONS.find(f => f.id == id);
                    announce(`【終戦】${winner.name} が世界を支配しました。`, winner.color, "#fff");
                    clearInterval(gameInterval);
                    startBtn.disabled = true;
                    return true;
                }
            }
            return false;
        }

        function simulate() {
            tickCount++;
            const chaos = parseInt(document.getElementById('chaosSlider').value);
            const occupied = []; const counts = {}; FACTIONS.forEach(f => counts[f.id] = 0);

            for(let y=0; y<GRID_SIZE; y++) {
                for(let x=0; x<GRID_SIZE; x++) {
                    if(gridState[y][x] !== 0) { occupied.push({x, y, id: gridState[y][x]}); counts[gridState[y][x]]++; }
                }
            }
            updateLegend(counts);
            checkMergers(counts);
            if (checkVictory(counts)) return;

            const occupancyRate = occupied.length / (GRID_SIZE * GRID_SIZE);

            // 疲弊フェーズ: 3000ティック後にCrashを封印
            if (tickCount > 3000 && !exhaustionPhase) {
                exhaustionPhase = true;
                announce("⚔️ 膠着状態 — 市場崩壊は停止", "#ff0", "#ff0");
            }

            // Doomカウンター: 時間経過で蓄積速度を減衰（収束に向かうほどイベントが減る）
            const doomDecay = 1 / (1 + tickCount * 0.0003);
            doomCounter += 0.000002 * currentSpeed * (chaos / 5) * doomDecay;
            if (Math.random() < doomCounter) {
                // 首位が50%超えたらSingularityは封印（大企業はリスク回避）
                let leadShare = 0;
                for (const id in counts) { const s = counts[id]/(GRID_SIZE*GRID_SIZE); if (s > leadShare) leadShare = s; }
                let events = leadShare > 0.5 ? ['anti', 'anti'] : ['anti', 'singularity'];
                if (occupancyRate < 0.9 && !exhaustionPhase) { events.push('crash'); }
                executeAnomaly(events[Math.floor(Math.random() * events.length)], false);
                doomCounter = 0.00001;
            }

            // 支配補正: 高占有率かつ最大派閥60%超でデッドロック破壊
            if (occupancyRate > 0.9) {
                let leaderId = null, leaderCount = 0;
                for (const id in counts) { if (counts[id] > leaderCount) { leaderCount = counts[id]; leaderId = parseInt(id); } }
                const leaderFaction = FACTIONS.find(f => f.id === leaderId);
                if (leaderFaction && leaderCount / (GRID_SIZE * GRID_SIZE) > 0.6) {
                    const leaderCells = occupied.filter(c => c.id === leaderId);
                    for (let b = 0; b < 3; b++) {
                        const src = leaderCells[Math.floor(Math.random() * leaderCells.length)];
                        if (!src) break;
                        const dx = [-1,1,0,0][b % 4], dy = [0,0,-1,1][b % 4];
                        const nx = src.x + dx, ny = src.y + dy;
                        if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && gridState[ny][nx] !== leaderId) {
                            gridState[ny][nx] = leaderId;
                            cells[ny * GRID_SIZE + nx].style.backgroundColor = leaderFaction.color;
                        }
                    }
                }
            }

            // 特異点モード: 対象派閥5倍拡張 + AI安全連合が集中攻撃
            if (singularityFactionId) {
                const sf = FACTIONS.find(f => f.id === singularityFactionId && f.active !== false);
                if (!sf || tickCount >= singularityEndTick) {
                    if (sf) announce(`🌌 特異点モード終了: ${sf.name}`, sf.color, sf.color);
                    singularityFactionId = null;
                } else {
                    // 5倍拡張（通常のchaos分に加え4倍ボーナス）
                    const sfCells = occupied.filter(c => c.id === singularityFactionId);
                    for (let b = 0; b < chaos * 4; b++) {
                        const src = sfCells[Math.floor(Math.random() * sfCells.length)];
                        if (!src) break;
                        const nx = src.x + (Math.random() < 0.5 ? (Math.random() < 0.5 ? 1 : -1) : 0);
                        const ny = src.y + (Math.random() < 0.5 ? (Math.random() < 0.5 ? 1 : -1) : 0);
                        if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
                            if (gridState[ny][nx] !== sf.id && gridState[ny][nx] !== 0) spawnSpark(nx, ny);
                            gridState[ny][nx] = sf.id;
                            cells[ny * GRID_SIZE + nx].style.backgroundColor = sf.color;
                        }
                    }
                    // AI安全連合: 他全派閥が特異点派閥のセルを優先攻撃（各派閥2セル/tick）
                    const coalition = FACTIONS.filter(f => f.active !== false && f.id !== singularityFactionId);
                    coalition.forEach(ally => {
                        for (let c = 0; c < 2; c++) {
                            if (sfCells.length === 0) break;
                            const target = sfCells[Math.floor(Math.random() * sfCells.length)];
                            gridState[target.y][target.x] = ally.id;
                            cells[target.y * GRID_SIZE + target.x].style.backgroundColor = ally.color;
                        }
                    });
                }
            }

            // ネットワーク効果: 首位派閥はシェア比例以上の展開ボーナス（非線形優位）
            {
                let leaderId = null, leaderCount = 0;
                for (const id in counts) { if (counts[id] > leaderCount) { leaderCount = counts[id]; leaderId = parseInt(id); } }
                const leaderShare = leaderCount / (GRID_SIZE * GRID_SIZE);
                if (leaderShare > 0.25 && leaderId !== null) {
                    const leaderFac = FACTIONS.find(f => f.id === leaderId);
                    // 25%超えた分だけ加速: 30%シェア→+1.5、50%→+7.5、70%→+13.5
                    const bonus = Math.floor((leaderShare - 0.25) * chaos * 3);
                    const leaderCells = occupied.filter(c => c.id === leaderId);
                    for (let b = 0; b < bonus; b++) {
                        const src = leaderCells[Math.floor(Math.random() * leaderCells.length)];
                        if (!src) break;
                        const nx = src.x + (Math.random() < 0.5 ? (Math.random() < 0.5 ? 1 : -1) : 0);
                        const ny = src.y + (Math.random() < 0.5 ? (Math.random() < 0.5 ? 1 : -1) : 0);
                        if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
                            if (gridState[ny][nx] !== leaderId && gridState[ny][nx] !== 0) spawnSpark(nx, ny);
                            gridState[ny][nx] = leaderId;
                            cells[ny * GRID_SIZE + nx].style.backgroundColor = leaderFac.color;
                        }
                    }
                }
            }

            for(let i=0; i < chaos; i++) {
                if(occupied.length === 0) return;
                const src = occupied[Math.floor(Math.random()*occupied.length)];
                const f = FACTIONS.find(fac => fac.id === src.id);
                if (!f || !f.active) continue;
                
                checkStateShift(f, counts[f.id]);

                if (counts[f.id] > 30) {
                    if (f.state === "B2C" && Math.random() < 0.02) spawn(src.x, src.y, '⚖️');
                    if (f.state === "B2G" && Math.random() < 0.03) spawn(src.x, src.y, '🔥');
                }
                if (f.state === "RD" && Math.random() < 0.01) spawn(src.x, src.y, '📡');

                const nx = src.x + (Math.random() < 0.5 ? (Math.random() < 0.5 ? 1 : -1) : 0);
                const ny = src.y + (Math.random() < 0.5 ? (Math.random() < 0.5 ? 1 : -1) : 0);

                if(nx>=0 && nx<GRID_SIZE && ny>=0 && ny<GRID_SIZE) {
                    if (gridState[ny][nx] !== f.id && gridState[ny][nx] !== 0) spawnSpark(nx, ny);
                    gridState[ny][nx] = f.id; cells[ny * GRID_SIZE + nx].style.backgroundColor = f.color;
                }
            }
        }
        init();
    </script>
