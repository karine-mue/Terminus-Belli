<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminus-Belli: Entropy Slider</title>
    <style>
        /* 既存のスタイルを継承しつつ追加 */
        body { background-color: #1a1a1a; color: #eee; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; height: 100vh; }
        #ui-container { background: rgba(0,0,0,0.8); border: 1px solid #444; color: #fff; padding: 20px; border-radius: 5px; width: 350px; position: absolute; left: 20px; top: 20px; z-index: 100; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; color: #aaa; }
        input[type="range"] { width: 100%; cursor: crosshair; }
        .conflict-btn { width: 100%; padding: 10px; background: #900; color: #fff; border: none; cursor: pointer; font-weight: bold; }
        .conflict-btn:disabled { background: #333; }
        #stage { display: grid; width: 80vw; height: 80vh; margin-top: 5vh; border: 1px solid #333; }
        .cell { outline: 0.1px solid #222; transition: background-color 0.1s; }
        .effect-icon { position: absolute; pointer-events: none; font-size: 20px; animation: fadeUp 1s forwards; z-index: 200; }
        @keyframes fadeUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
        #log { font-size: 10px; height: 50px; overflow: hidden; margin-top: 10px; color: #0f0; border-top: 1px solid #333; padding-top: 5px; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="control-group">
            <button class="conflict-btn" id="startBtn">紛争を開始</button>
        </div>
        
        <div class="control-group">
            <label id="chaosLabel">法と秩序 (Order) ⇔ 混沌 (Chaos)</label>
            <input type="range" id="chaosSlider" min="1" max="10" value="1">
        </div>

        <div class="control-group">
            <label id="speedLabel">時空の加速 (Time Dilation): x1</label>
            <input type="range" id="speedSlider" min="1" max="20" value="1">
            <small style="color: #600;">※一度加速した刻（とき）は戻せない</small>
        </div>

        <div id="status">Waiting for Terminal Click...</div>
        <div id="log"></div>
    </div>

    <div id="stage"></div>

    <script>
        const GRID_SIZE = 40;
        let isConflict = false;
        let gameInterval;
        let currentSpeed = 1;
        let maxSpeedReached = 1;

        const STATES = { RD: "R&D", B2C: "B2C", B2G: "B2G" };
        const FACTIONS = [
            { id: 1, name: "Goo〇le", color: "#4285F4", state: STATES.RD },
            { id: 2, name: "Micr〇soft", color: "#00A4EF", state: STATES.B2G },
            { id: 3, name: "Ope〇AI", color: "#10a37f", state: STATES.B2C },
            { id: 4, name: "Met〇", color: "#0668E1", state: STATES.B2C },
            { id: 7, name: "Qw〇n", color: "#8E44AD", state: STATES.RD }
        ];

        const stage = document.getElementById('stage');
        const startBtn = document.getElementById('startBtn');
        const speedSlider = document.getElementById('speedSlider');
        const chaosSlider = document.getElementById('chaosSlider');
        const logDiv = document.getElementById('log');
        
        let cells = [];
        let gridState = Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(0));

        function initGrid() {
            stage.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                stage.appendChild(cell);
                cells.push(cell);
            }
        }

        function addLog(msg) {
            const p = document.createElement('div');
            p.innerText = `> ${msg}`;
            logDiv.prepend(p);
        }

        // 不可逆な時間加速
        speedSlider.addEventListener('input', (e) => {
            let val = parseInt(e.target.value);
            if (val < maxSpeedReached) {
                speedSlider.value = maxSpeedReached; // 戻せない
            } else {
                maxSpeedReached = val;
                currentSpeed = val;
                document.getElementById('speedLabel').innerText = `時空の加速 (Time Dilation): x${val}`;
                if (isConflict) restartInterval();
            }
        });

        function restartInterval() {
            clearInterval(gameInterval);
            gameInterval = setInterval(simulate, 200 / currentSpeed);
        }

        startBtn.addEventListener('click', () => {
            if (!isConflict) {
                isConflict = true;
                startBtn.disabled = true;
                deployFactions();
                restartInterval();
            }
        });

        function deployFactions() {
            FACTIONS.forEach(f => {
                let x = Math.floor(Math.random()*GRID_SIZE), y = Math.floor(Math.random()*GRID_SIZE);
                gridState[y][x] = f.id;
                cells[y * GRID_SIZE + x].style.backgroundColor = f.color;
            });
        }

        function simulate() {
            const chaos = parseInt(chaosSlider.value);
            const occupied = [];
            const counts = {};
            FACTIONS.forEach(f => counts[f.id] = 0);

            for(let y=0; y<GRID_SIZE; y++) {
                for(let x=0; x<GRID_SIZE; x++) {
                    if(gridState[y][x] !== 0) {
                        occupied.push({x, y, id: gridState[y][x]});
                        counts[gridState[y][x]]++;
                    }
                }
            }

            // 公平なサンプリング
            for(let i=0; i < chaos; i++) {
                if(occupied.length === 0) return;
                const src = occupied[Math.floor(Math.random()*occupied.length)];
                const f = FACTIONS.find(fac => fac.id === src.id);
                
                // 知名度（占有数）に応じたイベント発生
                const popularity = counts[f.id];
                if (popularity > 50) { // 一定以上の知名度でイベント解禁
                    if (f.state === STATES.B2C && Math.random() < 0.05) spawnEffect(src.x, src.y, '⚖️ LAWSUIT', f.name);
                    if (f.state === STATES.B2G && Math.random() < 0.08) spawnEffect(src.x, src.y, '🔥 FLAME', f.name);
                }
                if (f.state === STATES.RD && Math.random() < 0.02) spawnEffect(src.x, src.y, '📡 RUMOR', f.name);

                // 侵略
                const nx = src.x + (Math.random() < 0.5 ? (Math.random() < 0.5 ? 1 : -1) : 0);
                const ny = src.y + (Math.random() < 0.5 ? (Math.random() < 0.5 ? 1 : -1) : 0);

                if(nx>=0 && nx<GRID_SIZE && ny>=0 && ny<GRID_SIZE) {
                    gridState[ny][nx] = f.id;
                    cells[ny * GRID_SIZE + nx].style.backgroundColor = f.color;
                }
            }
        }

        function spawnEffect(x, y, txt, name) {
            const icon = document.createElement('div');
            icon.className = 'effect-icon';
            icon.innerText = txt;
            const target = cells[y * GRID_SIZE + x].getBoundingClientRect();
            icon.style.left = `${target.left}px`;
            icon.style.top = `${target.top}px`;
            document.body.appendChild(icon);
            addLog(`${name}: ${txt} 発生`);
            setTimeout(() => icon.remove(), 1000);
        }

        initGrid();
    </script>
</body>
</html>
